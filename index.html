<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigment Database | Akvarellskiss Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Huvudcontainer -->
    <div id="app-container">
        <!-- Header för verktyget -->
        <header class="tool-header">
            <h1>Pigment Database</h1>
            <p class="subtitle">Reference for Watercolour Artists</p>
        </header>

        <!-- Kontrollrader: Sök & Filter -->
        <section class="controls-bar">
            <div class="search-box-container">
                <label for="searchInput" class="visually-hidden">Search Pigments</label>
                <input type="text" id="searchInput" placeholder="Search name, code (e.g. PY254), formula...">
                <button id="clearBtn" title="Clear search">✕</button>
            </div>

            <!-- Kategorier: Färgfamilj & Teknik -->
            <div class="filters-wrapper">
                <div class="filter-group-title">Color Family</div>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="Blå">Blå</button>
                    <button class="filter-btn" data-filter="Gul">Gul</button>
                    <button class="filter-btn" data-filter="Röd">Röd</button>
                    <button class="filter-btn" data-filter="Grön">Grön</button>
                </div>

                <div class="filter-group-title">Properties</div>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="all-prop">All Properties</button>
                    <button class="filter-btn" data-filter="Opaque">Opaque</button>
                    <button class="filter-btn" data-filter="Transparent">Transparent</button>
                </div>

                <div class="filter-group-title">Lightfastness</div>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="all-lf">All</button>
                    <button class="filter-btn" data-filter="LF-I">I</button>
                    <button class="filter-btn" data-filter="LF-II">II</button>
                    <button class="filter-btn" data-filter="LF-III">III</button>
                </div>
            </div>
        </section>

        <!-- Huvudinnehåll -->
        <main id="pigment-grid" class="grid-container">
            <!-- JS genererar kort här -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
